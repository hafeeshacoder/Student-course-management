<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | EduTrack Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="page-reset-password">

<div class="circle1"></div>

<div class="circle2"></div>

<div class="card-box">

<div class="logo">

<i class="bi bi-key-fill"></i>

</div>

<h2>Create New Password</h2>

<p class="subtitle">

Your new password must be different from your previous password.

</p>

<form id="resetForm">

<label class="form-label">

New Password

</label>

<div class="input-box">

<i class="bi bi-lock-fill"></i>

<input
type="password"
id="password"
class="form-control"
placeholder="Enter new password"
required>

<span class="eye" onclick="togglePassword('password',this)">
<i class="bi bi-eye-fill"></i>
</span>

<div class="progress">

<div id="strengthBar"
class="progress-bar bg-danger"
style="width:20%">

</div>

</div>

</div>

<label class="form-label">

Confirm Password

</label>

<div class="input-box">

<i class="bi bi-lock-fill"></i>

<input
type="password"
id="confirmPassword"
class="form-control"
placeholder="Confirm password"
required>

<span class="eye" onclick="togglePassword('confirmPassword',this)">
<i class="bi bi-eye-fill"></i>
</span>

</div>

<button class="btn btn-reset text-white w-100">

<i class="bi bi-check-circle-fill"></i>

Reset Password

</button>

<div class="success" id="successMessage">

<i class="bi bi-check-circle-fill"></i>

Password Updated Successfully!

</div>

</form>

<div class="back">

<a href="login.html">

<i class="bi bi-arrow-left"></i>

Back to Login

</a>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="script.js"></script>
</body>

</html>
