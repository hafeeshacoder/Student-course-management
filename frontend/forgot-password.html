<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | EduTrack Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#f8f9ff,#f3ecff,#eef4ff);

overflow:hidden;

}

/* Background Circles */

.circle1{

position:absolute;

width:300px;

height:300px;

background:#d8b4fe;

border-radius:50%;

top:-80px;

left:-80px;

opacity:.25;

}

.circle2{

position:absolute;

width:260px;

height:260px;

background:#93c5fd;

border-radius:50%;

bottom:-90px;

right:-90px;

opacity:.25;

}

/* Card */

.card-box{

width:460px;

background:rgba(255,255,255,.88);

backdrop-filter:blur(18px);

padding:45px;

border-radius:25px;

box-shadow:0 20px 50px rgba(0,0,0,.08);

animation:fadeUp .8s;

position:relative;

z-index:2;

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.logo{

width:90px;

height:90px;

background:linear-gradient(135deg,#7c3aed,#2563eb);

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

margin:auto;

color:white;

font-size:42px;

margin-bottom:20px;

box-shadow:0 10px 25px rgba(124,58,237,.3);

}

h2{

font-weight:700;

text-align:center;

margin-bottom:8px;

color:#1e293b;

}

.subtitle{

text-align:center;

color:#64748b;

margin-bottom:30px;

font-size:15px;

}

.form-label{

font-weight:600;

color:#475569;

}

.form-control{

height:55px;

border-radius:15px;

border:1px solid #dbe4ff;

padding-left:45px;

}

.form-control:focus{

border-color:#7c3aed;

box-shadow:0 0 0 .2rem rgba(124,58,237,.15);

}

.input-box{

position:relative;

margin-bottom:25px;

}

.input-box i{

position:absolute;

left:16px;

top:17px;

font-size:18px;

color:#7c3aed;

}

.btn-reset{

height:55px;

border:none;

border-radius:15px;

background:linear-gradient(135deg,#7c3aed,#2563eb);

font-weight:600;

font-size:17px;

transition:.3s;

}

.btn-reset:hover{

transform:translateY(-2px);

box-shadow:0 15px 30px rgba(124,58,237,.25);

}

.back{

text-align:center;

margin-top:25px;

}

.back a{

text-decoration:none;

color:#7c3aed;

font-weight:600;

}

.back a:hover{

text-decoration:underline;

}

.info{

background:#eef4ff;

border-left:5px solid #7c3aed;

padding:15px;

border-radius:12px;

margin-bottom:25px;

font-size:14px;

color:#475569;

}

.success-msg{

display:none;

margin-top:20px;

padding:15px;

border-radius:12px;

background:#dcfce7;

color:#166534;

font-weight:600;

text-align:center;

}

@media(max-width:500px){

.card-box{

width:92%;

padding:30px;

}

}

</style>

</head>

<body>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="card-box">

<div class="logo">
<i class="bi bi-shield-lock-fill"></i>
</div>

<h2>Forgot Password?</h2>

<p class="subtitle">
Enter your registered email address and we'll send you a password reset link.
</p>

<div class="info">

<i class="bi bi-info-circle-fill"></i>

Please make sure you enter the same email used during registration.

</div>

<form id="forgotForm">

<label class="form-label">
Email Address
</label>

<div class="input-box">

<i class="bi bi-envelope-fill"></i>

<input
type="email"
class="form-control"
id="email"
placeholder="Enter your email"
required>

</div>

<button
type="submit"
class="btn btn-reset text-white w-100">

<i class="bi bi-send-fill"></i>

Send Reset Link

</button>

<div class="success-msg" id="successMsg">

<i class="bi bi-check-circle-fill"></i>

Reset link has been sent successfully.

</div>

</form>

<div class="back">

<a href="login.html">

<i class="bi bi-arrow-left"></i>

Back to Login

</a>

</div>

</div>
<script>

// Forgot Password Form
document.getElementById("forgotForm").addEventListener("submit", function(e){

e.preventDefault();

const email = document.getElementById("email").value.trim();
const successMsg = document.getElementById("successMsg");

if(email === ""){

alert("Please enter your registered email address.");

return;

}

// Show success message
successMsg.style.display = "block";

// Disable button
const btn = document.querySelector(".btn-reset");

btn.disabled = true;
btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Link Sent';

// Redirect after 3 seconds
setTimeout(function(){

window.location.href="reset-password.html";

},3000);

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
