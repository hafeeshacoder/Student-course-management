<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | EduTrack Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#f8f9ff,#eef2ff,#f3ecff);

overflow:hidden;

}

/* Decorative Circles */

.circle1{

position:absolute;

width:320px;

height:320px;

background:#c4b5fd;

border-radius:50%;

top:-100px;

left:-80px;

opacity:.25;

}

.circle2{

position:absolute;

width:260px;

height:260px;

background:#93c5fd;

border-radius:50%;

bottom:-90px;

right:-80px;

opacity:.25;

}

/* Card */

.card-box{

width:480px;

background:rgba(255,255,255,.9);

backdrop-filter:blur(18px);

padding:45px;

border-radius:25px;

box-shadow:0 20px 45px rgba(0,0,0,.08);

position:relative;

z-index:10;

animation:fadeUp .8s;

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.logo{

width:90px;

height:90px;

background:linear-gradient(135deg,#7c3aed,#2563eb);

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

margin:auto;

margin-bottom:20px;

font-size:40px;

color:white;

}

h2{

text-align:center;

font-weight:700;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#64748b;

margin-bottom:30px;

}

.form-label{

font-weight:600;

}

.input-box{

position:relative;

margin-bottom:22px;

}

.input-box i{

position:absolute;

left:16px;

top:18px;

color:#7c3aed;

font-size:18px;

}

.form-control{

height:55px;

padding-left:45px;

padding-right:45px;

border-radius:14px;

}

.eye{

position:absolute;

right:15px;

top:17px;

cursor:pointer;

font-size:18px;

color:#7c3aed;

}

.btn-reset{

height:55px;

border:none;

border-radius:14px;

background:linear-gradient(135deg,#7c3aed,#2563eb);

font-weight:600;

font-size:17px;

transition:.3s;

}

.btn-reset:hover{

transform:translateY(-2px);

box-shadow:0 15px 30px rgba(124,58,237,.25);

}

.progress{

height:8px;

margin-top:10px;

display:none;

}

.success{

display:none;

margin-top:20px;

padding:15px;

border-radius:12px;

background:#dcfce7;

color:#166534;

text-align:center;

font-weight:600;

}

.back{

margin-top:25px;

text-align:center;

}

.back a{

text-decoration:none;

font-weight:600;

color:#7c3aed;

}

@media(max-width:500px){

.card-box{

width:92%;

padding:30px;

}

}

</style>

</head>

<body>

<div class="circle1"></div>

<div class="circle2"></div>

<div class="card-box">

<div class="logo">

<i class="bi bi-key-fill"></i>

</div>

<h2>Create New Password</h2>

<p class="subtitle">

Your new password must be different from your previous password.

</p>

<form id="resetForm">

<label class="form-label">

New Password

</label>

<div class="input-box">

<i class="bi bi-lock-fill"></i>

<input
type="password"
id="password"
class="form-control"
placeholder="Enter new password"
required>

<span class="eye" onclick="togglePassword('password',this)">
<i class="bi bi-eye-fill"></i>
</span>

<div class="progress">

<div id="strengthBar"
class="progress-bar bg-danger"
style="width:20%">

</div>

</div>

</div>

<label class="form-label">

Confirm Password

</label>

<div class="input-box">

<i class="bi bi-lock-fill"></i>

<input
type="password"
id="confirmPassword"
class="form-control"
placeholder="Confirm password"
required>

<span class="eye" onclick="togglePassword('confirmPassword',this)">
<i class="bi bi-eye-fill"></i>
</span>

</div>

<button class="btn btn-reset text-white w-100">

<i class="bi bi-check-circle-fill"></i>

Reset Password

</button>

<div class="success" id="successMessage">

<i class="bi bi-check-circle-fill"></i>

Password Updated Successfully!

</div>

</form>

<div class="back">

<a href="login.html">

<i class="bi bi-arrow-left"></i>

Back to Login

</a>

</div>

</div>
<script>

// Show / Hide Password
function togglePassword(id, element){

let input = document.getElementById(id);
let icon = element.querySelector("i");

if(input.type === "password"){

input.type = "text";
icon.classList.remove("bi-eye-fill");
icon.classList.add("bi-eye-slash-fill");

}else{

input.type = "password";
icon.classList.remove("bi-eye-slash-fill");
icon.classList.add("bi-eye-fill");

}

}

// Password Strength
const password = document.getElementById("password");
const progress = document.querySelector(".progress");
const strengthBar = document.getElementById("strengthBar");

password.addEventListener("keyup",function(){

progress.style.display="block";

let value=password.value.length;

if(value<6){

strengthBar.style.width="25%";
strengthBar.className="progress-bar bg-danger";

}
else if(value<10){

strengthBar.style.width="60%";
strengthBar.className="progress-bar bg-warning";

}
else{

strengthBar.style.width="100%";
strengthBar.className="progress-bar bg-success";

}

});

// Reset Password
document.getElementById("resetForm").addEventListener("submit",function(e){

e.preventDefault();

let pass=document.getElementById("password").value;
let confirm=document.getElementById("confirmPassword").value;

if(pass!==confirm){

alert("Passwords do not match!");

return;

}

document.getElementById("successMessage").style.display="block";

const btn=document.querySelector(".btn-reset");

btn.disabled=true;

btn.innerHTML='<i class="bi bi-check-circle-fill"></i> Password Updated';

setTimeout(function(){

window.location.href="login.html";

},2500);

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
