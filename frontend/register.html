<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EduTrack | Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#7c3aed,#10b981);
background-size:300% 300%;
animation:bg 8s infinite alternate;

}


@keyframes bg{

0%{
background-position:left;
}

100%{
background-position:right;
}

}



.register-box{

width:500px;
padding:40px;

background:rgba(255,255,255,.18);
backdrop-filter:blur(15px);

border-radius:30px;

box-shadow:0 20px 50px rgba(0,0,0,.3);

}



.logo{

width:80px;
height:80px;

background:white;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

margin:auto;

font-size:35px;

color:#2563eb;

}



h2{

color:white;
font-weight:700;

}



p{

color:white;

}



.form-control,
.form-select{

height:50px;

border-radius:15px;

border:none;

}



.input-box{

position:relative;

margin-bottom:18px;

}



.input-box i{

position:absolute;

left:15px;

top:15px;

color:#555;

}



.input-box input,
.input-box select{

padding-left:45px;

}



.password-icon{

position:absolute;

right:15px;

top:15px;

cursor:pointer;

color:#555;

}



.register-btn{

width:100%;

height:55px;

border-radius:20px;

border:none;

background:white;

color:#2563eb;

font-size:18px;

font-weight:600;

transition:.3s;

}



.register-btn:hover{

background:#2563eb;

color:white;

transform:translateY(-3px);

}



.login-link{

text-align:center;

margin-top:20px;

color:white;

}



.login-link a{

color:#ffe082;

font-weight:600;

text-decoration:none;

}



.error{

color:#ffcccc;

font-size:13px;

display:none;

}



.profile{

text-align:center;

}



.profile img{

width:80px;

height:80px;

border-radius:50%;

object-fit:cover;

display:none;

margin:auto;

}



</style>

</head>


<body>


<div class="register-box">


<div class="logo">

<i class="bi bi-person-plus-fill"></i>

</div>


<h2 class="text-center mt-3">

Create Account

</h2>


<p class="text-center">

Join EduTrack and start learning

</p>



<form id="registerForm">



<div class="profile">

<img id="preview">


</div>


<div class="input-box">


<i class="bi bi-person-fill"></i>

<input type="file"
class="form-control"
id="photo"
accept="image/*">


</div>



<div class="input-box">


<i class="bi bi-person"></i>

<input type="text"
class="form-control"
placeholder="Full Name"
id="name"
required>


</div>



<div class="input-box">


<i class="bi bi-envelope"></i>


<input type="email"
class="form-control"
placeholder="Email"
id="email"
required>


</div>



<div class="input-box">


<i class="bi bi-phone"></i>


<input type="number"
class="form-control"
placeholder="Mobile Number"
required>


</div>




<div class="input-box">


<i class="bi bi-building"></i>


<select class="form-select"
required>


<option value="">
Select Department
</option>

<option>
Computer Science
</option>

<option>
Information Technology
</option>

<option>
Artificial Intelligence
</option>

<option>
Data Science
</option>


</select>


</div>




<div class="input-box">


<i class="bi bi-lock"></i>


<input type="password"
class="form-control"
placeholder="Password"
id="password"
required>


<i class="bi bi-eye password-icon"
id="showPassword"></i>


</div>



<div class="input-box">


<i class="bi bi-lock-fill"></i>


<input type="password"
class="form-control"
placeholder="Confirm Password"
id="confirmPassword"
required>


</div>



<div class="error"
id="error">

Password does not match

</div>




<button class="register-btn mt-3">

Create Account

</button>



<div class="login-link">


Already have an account?

<a href="login.html">

Login

</a>


</div>



</form>


</div>





<script>


// Image Preview


let photo=document.getElementById("photo");

let preview=document.getElementById("preview");


photo.onchange=function(){

let reader=new FileReader();


reader.onload=function(e){

preview.src=e.target.result;

preview.style.display="block";


}


reader.readAsDataURL(photo.files[0]);

}



// Show Hide Password


let show=document.getElementById("showPassword");

let password=document.getElementById("password");


show.onclick=function(){


if(password.type==="password"){


password.type="text";


show.classList.remove("bi-eye");


show.classList.add("bi-eye-slash");


}

else{


password.type="password";


show.classList.remove("bi-eye-slash");


show.classList.add("bi-eye");


}


}



// Form Validation


document.getElementById("registerForm")
.addEventListener("submit",function(e){


e.preventDefault();


let pass=document.getElementById("password").value;


let confirm=document.getElementById("confirmPassword").value;


let error=document.getElementById("error");



if(pass!==confirm){


error.style.display="block";


}

else{


error.style.display="none";


alert("Registration Successful!");


window.location.href="login.html";


}



});



</script>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
