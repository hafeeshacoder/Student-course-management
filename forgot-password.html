<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | EduTrack Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="page-forgot-password">

<div class="circle1"></div>
<div class="circle2"></div>

<div class="card-box">

<div class="logo">
<i class="bi bi-shield-lock-fill"></i>
</div>

<h2>Forgot Password?</h2>

<p class="subtitle">
Enter your registered email address and we'll send you a password reset link.
</p>

<div class="info">

<i class="bi bi-info-circle-fill"></i>

Please make sure you enter the same email used during registration.

</div>

<form id="forgotForm">

<label class="form-label">
Email Address
</label>

<div class="input-box">

<i class="bi bi-envelope-fill"></i>

<input
type="email"
class="form-control"
id="email"
placeholder="Enter your email"
required>

</div>

<button
type="submit"
class="btn btn-reset text-white w-100">

<i class="bi bi-send-fill"></i>

Send Reset Link

</button>

<div class="success-msg" id="successMsg">

<i class="bi bi-check-circle-fill"></i>

Reset link has been sent successfully.

</div>

</form>

<div class="back">

<a href="login.html">

<i class="bi bi-arrow-left"></i>

Back to Login

</a>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
